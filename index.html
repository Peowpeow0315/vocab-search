<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>華語兒童高頻詞彙檢索（Wu et al., 2021）</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.page{max-width:820px;margin:0 auto;padding:2rem 1.25rem 4rem}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:12px;color:#888;margin-bottom:1.5rem}
.subtitle a{color:#555}
.section-label{font-size:11px;font-weight:600;color:#999;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.panel{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.age-group{display:flex;gap:6px;flex-wrap:wrap}
.age-btn{padding:5px 14px;border-radius:99px;cursor:pointer;font-size:13px;border:1.5px solid #ddd;background:#fff;color:#555;transition:all .15s;user-select:none}
.age-btn:hover{border-color:#aaa;color:#222}
.age-btn.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.pos-group{display:flex;gap:5px;flex-wrap:wrap}
.pos-btn{padding:3px 10px;border-radius:99px;cursor:pointer;font-size:12px;border:1px solid transparent;transition:all .12s;user-select:none;opacity:.75}
.pos-btn:hover{opacity:1}
.pos-btn.on{opacity:1;font-weight:600;box-shadow:0 0 0 2px rgba(0,0,0,.15)}
.controls-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:.75rem}
.search-input{padding:7px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;width:180px;outline:none}
.search-input:focus{border-color:#888}
.search-input::placeholder{color:#bbb}
.zy-btn{padding:6px 14px;border-radius:8px;font-size:13px;border:1px solid #ddd;background:#fff;color:#444;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.zy-btn:hover{border-color:#888;background:#f8f8f8}
.zy-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.zy-panel{display:none;background:#fff;border:1px solid #e0e0de;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.zy-panel.show{display:block}
.zy-section-title{font-size:11px;font-weight:600;color:#999;letter-spacing:.05em;margin-bottom:6px;margin-top:10px}
.zy-section-title:first-child{margin-top:0}
.zy-keys{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:2px}
.zy-key{width:36px;height:36px;border-radius:7px;border:1px solid #ddd;background:#fafafa;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none}
.zy-key:hover{border-color:#888;background:#f0f0ee}
.zy-key.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.zy-clear{padding:4px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:12px;color:#888;cursor:pointer;margin-left:4px}
.zy-clear:hover{border-color:#999;color:#333}
.stat-row{font-size:12px;color:#888;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.stat-row b{color:#333;font-weight:600}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#999;letter-spacing:.04em;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff}
tbody tr:hover{background:#fafafa}
tbody td{padding:7px 10px;border-bottom:1px solid #f2f2f0;vertical-align:middle}
.rank{color:#bbb;font-size:12px;width:44px}
.zh{font-size:14px;font-weight:500}
.py-cell{font-size:11px;color:#aaa}
.zy-cell{font-size:13px;color:#555;letter-spacing:.05em}
.ages-cell{display:flex;gap:3px;flex-wrap:wrap}
.age-pill{font-size:11px;padding:1px 6px;border-radius:99px;background:#f0f0ee;color:#666}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;display:inline-block}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:13px}
.note{font-size:11px;color:#aaa;margin-top:1rem;line-height:1.6}
@media(max-width:600px){.page{padding:1rem .75rem 3rem}.search-input{width:100%}.zy-key{width:32px;height:32px;font-size:14px}}
</style>
</head>
<body>
<div class="page">
  <h1>華語兒童高頻詞彙檢索</h1>
  <p class="subtitle">資料來源：Wu, Lin, Huang &amp; Tsai (2021). <em>SAGE Open</em>. <a href="https://doi.org/10.1177/21582440211036109" target="_blank">doi:10.1177/21582440211036109</a> · CC BY 4.0</p>

  <div class="panel">
    <div class="section-label">年齡組（可複選）</div>
    <div class="age-group" id="age-group"></div>
  </div>

  <div class="panel">
    <div class="section-label">詞性篩選（可複選）</div>
    <div class="pos-group" id="pos-group"></div>
  </div>

  <!-- Zhuyin keyboard panel -->
  <div class="zy-panel" id="zy-panel">
    <div class="zy-section-title">聲母</div>
    <div class="zy-keys" id="zy-initials"></div>
    <div class="zy-section-title" style="margin-top:10px">介母 ＆ 韻母</div>
    <div class="zy-keys" id="zy-finals"></div>
    <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:#888">已選：</span>
      <span id="zy-selected" style="font-size:15px;letter-spacing:.05em;color:#1a1a1a;min-width:40px">—</span>
      <button class="zy-clear" id="zy-clear-btn">清除</button>
    </div>
  </div>

  <div class="panel">
    <div class="controls-row">
      <input class="search-input" id="q" type="text" placeholder="搜尋漢字或拼音…">
      <button class="zy-btn" id="zy-toggle">
        <span>注音查詢</span>
      </button>
      <div class="stat-row" id="stat"></div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th class="rank">排名</th>
            <th>詞彙</th>
            <th>注音</th>
            <th>詞性</th>
            <th>出現年齡組</th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
    <p class="note">「排名」為各年齡組內的頻率排名。選取多個年齡組時，顯示所有選取組別的高頻詞聯集。注音符號使用漢語拼音轉換，聲調標記方式：ˊ二聲、ˇ三聲、ˋ四聲、˙輕聲，一聲不標。</p>
  </div>
</div>

function parseRaw(key) {
  return RAW[key].trim().split('\n').map(l => {
    const p = l.split('|');
    return { rank: +p[0], zh: p[1], py: p[2], pos: p[3] };
  });
}

let selAges = new Set(['3y']);
let selPos = new Set();
let q = '';
let selZy = null;

// Build Zhuyin keyboard
function buildZyKeyboard() {
  const initDiv = document.getElementById('zy-initials');
  const finDiv = document.getElementById('zy-finals');
  ZY_INITIALS.forEach(z => {
    const b = document.createElement('div');
    b.className = 'zy-key' + (selZy === z ? ' on' : '');
    b.textContent = z;
    b.onclick = () => { selZy = selZy === z ? null : z; render(); };
    initDiv.appendChild(b);
  });
  ZY_FINALS.forEach(z => {
    const b = document.createElement('div');
    b.className = 'zy-key' + (selZy === z ? ' on' : '');
    b.textContent = z;
    b.onclick = () => { selZy = selZy === z ? null : z; render(); };
    finDiv.appendChild(b);
  });
}

document.getElementById('zy-toggle').onclick = () => {
  const panel = document.getElementById('zy-panel');
  const btn = document.getElementById('zy-toggle');
  const showing = panel.classList.toggle('show');
  btn.classList.toggle('active', showing);
  if (!showing) { selZy = null; render(); }
};

document.getElementById('zy-clear-btn').onclick = () => { selZy = null; render(); };

function getUnionItems() {
  const map = new Map();
  selAges.forEach(age => {
    parseRaw(age).forEach(item => {
      const key = item.zh + '|' + item.pos;
      if (!map.has(key)) map.set(key, { ...item, ages: new Set() });
      map.get(key).ages.add(age);
    });
  });
  return Array.from(map.values());
}

function buildAgeButtons() {
  const g = document.getElementById('age-group');
  g.innerHTML = '';
  AGES.forEach(([k, l]) => {
    const b = document.createElement('button');
    b.className = 'age-btn' + (selAges.has(k) ? ' on' : '');
    b.textContent = l;
    b.onclick = () => {
      if (selAges.has(k)) { if (selAges.size > 1) selAges.delete(k); }
      else selAges.add(k);
      render();
    };
    g.appendChild(b);
  });
}

function buildPosButtons(items) {
  const counts = {};
  items.forEach(i => { counts[i.pos] = (counts[i.pos] || 0) + 1; });
  const g = document.getElementById('pos-group');
  g.innerHTML = '';
  Object.keys(PC).filter(k => counts[k]).forEach(k => {
    const c = PK[k] || { bg: '#eee', fg: '#555' };
    const b = document.createElement('button');
    b.className = 'pos-btn' + (selPos.has(k) ? ' on' : '');
    b.style.cssText = `background:${c.bg};color:${c.fg};`;
    b.textContent = PC[k] + ' ' + counts[k];
    b.onclick = () => { if (selPos.has(k)) selPos.delete(k); else selPos.add(k); render(); };
    g.appendChild(b);
  });
}

function updateZyKeys() {
  document.querySelectorAll('.zy-key').forEach(el => {
    el.classList.toggle('on', el.textContent === selZy);
  });
  const sel = document.getElementById('zy-selected');
  sel.textContent = selZy || '—';
}

function render() {
  buildAgeButtons();
  const all = getUnionItems();
  buildPosButtons(all);
  updateZyKeys();

  const sq = q.trim();
  let filtered = all.filter(i => {
    if (selPos.size > 0 && !selPos.has(i.pos)) return false;
    if (sq && !i.zh.includes(sq) && !i.py.includes(sq)) return false;
    if (selZy) {
      const zy = getZhuyin(i.py);
      if (!zy.includes(selZy)) return false;
    }
    return true;
  });
  filtered.sort((a, b) => a.rank - b.rank);

  const tb = document.getElementById('tb');
  if (!filtered.length) {
    tb.innerHTML = '<tr><td colspan="5"><div class="empty">查無符合條件的詞彙</div></td></tr>';
  } else {
    tb.innerHTML = filtered.map(i => {
      const c = PK[i.pos] || { bg: '#eee', fg: '#555' };
      const zy = getZhuyin(i.py);
      const agePills = Array.from(i.ages).sort().map(a => {
        const label = AGES.find(x => x[0] === a)?.[1] || a;
        return `<span class="age-pill">${label}</span>`;
      }).join('');
      // highlight matched zhuyin
      let zyDisplay = zy;
      if (selZy && zy.includes(selZy)) {
        zyDisplay = zy.split(selZy).join(`<span style="background:#fef3c7;border-radius:3px;padding:0 1px">${selZy}</span>`);
      }
      return `<tr>
        <td class="rank">${i.rank}</td>
        <td><span class="zh">${i.zh}</span></td>
        <td class="zy-cell">${zyDisplay}</td>
        <td><span class="badge" style="background:${c.bg};color:${c.fg}">${PC[i.pos] || i.pos}</span></td>
        <td><div class="ages-cell">${agePills}</div></td>
      </tr>`;
    }).join('');
  }

  const ageLabel = Array.from(selAges).sort().map(a => AGES.find(x => x[0] === a)?.[1] || a).join('、');
  const posLabel = selPos.size ? '・詞性：' + Array.from(selPos).map(p => PC[p]).join('、') : '';
  const zyLabel = selZy ? `・注音：${selZy}` : '';
  document.getElementById('stat').innerHTML =
    `<b>${filtered.length}</b> 詞・年齡：${ageLabel}${posLabel}${zyLabel}${sq ? '・搜尋：' + sq : ''}`;
}

document.getElementById('q').oninput = e => { q = e.target.value; render(); };
buildZyKeyboard();
render();
</script>
